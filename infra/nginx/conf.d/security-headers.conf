# Security Headers — included from sites-enabled/showcase
# Must be included wherever add_header is used (Nginx 1.26.x inheritance pitfall)

# HTTP Strict Transport Security (1 year, includes subdomains)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy — full URL only for same-origin
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy — deny all browser features by default
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# Content Security Policy
# Allows: self-hosted, cdnjs (Font Awesome), Google Fonts
# Blocks: everything else (inline scripts, eval, plugins, frames from other origins)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://www.google.com https://*.analytics.google.com https://www.googletagmanager.com; frame-src 'self' https://calendar.google.com; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;
